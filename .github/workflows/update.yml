name: Update_Shiki_data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"   # ежедневно (UTC)
  push:
    branches: [ "main" ]

jobs:
  build-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch Shiki stats
        env:
          SHIKI_NICKNAME: ${{ secrets.SHIKI_NICKNAME }}
          SHIKI_USER_AGENT: shiki-dashboard-github-actions
          # если список приватный — можно добавить токен (опционально):
          SHIKI_BEARER_TOKEN: ${{ secrets.SHIKI_BEARER_TOKEN }}
          OUT_PATH: data/latest.json
          SHIKI_SLEEP_SEC: "0.8"
        run: python scripts/fetch_shiki.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/latest.json
          git commit -m "Update data" || echo "No changes"
          git push
